<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="base-path" content=".">
  <title>Sample Deck</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reset.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
  <link rel="stylesheet" href="themes/base.css">
  <link rel="stylesheet" href="themes/colors/plain.css" id="color-theme">
  <link rel="stylesheet" href="themes/layouts/standard.css" id="layout-theme">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/monokai.css">
</head>
<body>
  <div class="reveal">
    <div class="slides">
      <section data-markdown data-separator="^\n---\n" data-separator-vertical="^\n--\n" data-separator-notes="^Note:">
        <textarea data-template id="slides-content">
        </textarea>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="themes/variants.js"></script>
  <script data-deck="sample">
    mermaid.initialize({
      startOnLoad: false,
      theme: 'neutral',
      fontFamily: 'Inter, sans-serif',
      flowchart: { useMaxWidth: true, htmlLabels: true, wrap: true },
      sequence: { useMaxWidth: true, wrap: true }
    });

    function dedent(text) {
      const lines = text.split('\n');
      const minIndent = lines
        .filter(l => l.trim().length > 0)
        .reduce((min, l) => Math.min(min, l.match(/^\s*/)[0].length), Infinity);
      return lines.map(l => l.slice(minIndent)).join('\n').trim();
    }

    // Pre-process markdown: convert ```mermaid blocks to <div class="mermaid">
    // BEFORE Reveal/Highlight sees them, avoiding the className conflict
    function preprocessMermaid(md) {
      return md.replace(/```mermaid\n([\s\S]*?)```/g, function(match, content) {
        return '<div class="mermaid">\n' + dedent(content) + '\n</div>';
      });
    }

    const scriptTag = document.querySelector('script[data-deck]');
    const deck = scriptTag.getAttribute('data-deck');
    const basePath = document.querySelector('meta[name="base-path"]');
    const base = basePath ? basePath.getAttribute('content') : '.';
    fetch(base + '/decks/' + deck + '.md')
      .then(r => {
        if (!r.ok) throw new Error('Deck not found: ' + deck);
        return r.text();
      })
      .then(md => {
        document.getElementById('slides-content').textContent = preprocessMermaid(md);
        Reveal.initialize({
          hash: true,
          center: false,
          transition: 'none',
          transitionSpeed: 'fast',
          backgroundTransition: 'none',
          plugins: [RevealMarkdown, RevealHighlight, RevealNotes]
        }).then(() => {
          mermaid.run();
        });
      })
      .catch(err => {
        document.querySelector('.slides').innerHTML =
          '<section><h2>Error</h2><p>' + err.message + '</p></section>';
        Reveal.initialize();
      });
  </script>
</body>
</html>
