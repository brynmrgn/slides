<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Open Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 640px;
      margin: 4rem auto;
      padding: 0 1.5rem;
      color: #1a1a1a;
      line-height: 1.6;
    }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    h2 { font-size: 1.3rem; margin-top: 2.5rem; margin-bottom: 0.5rem; }
    p { margin-bottom: 0.8rem; }
    ul { margin-left: 1.5em; margin-bottom: 1rem; }
    li { margin-bottom: 0.3rem; }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
    table { font-size: 0.85rem; border-collapse: collapse; width: 100%; margin-top: 0.5rem; margin-bottom: 1rem; }
    th, td { padding: 0.4em 0.8em; border-bottom: 1px solid #e0e0e0; text-align: left; }
    code { background: #f0f0f0; padding: 0.1em 0.3em; border-radius: 0.2rem; font-size: 0.9em; }
    pre { background: #f5f5f5; padding: 1rem; border-radius: 0.3rem; overflow-x: auto; margin-bottom: 1rem; }
    pre code { background: none; padding: 0; }
  </style>
</head>
<body>
  <div id="content"></div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    fetch('about.md')
      .then(r => r.text())
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);
        document.title = document.querySelector('h1')?.textContent || 'About';
      });
  </script>
</body>
</html>
